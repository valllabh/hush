version: "2"

# Linters we trust to flag real bugs. Stylistic checks (QF*, ST1000,
# ST1003) are explicitly disabled because they propose rewrites or
# renames, not correctness fixes:
#   - QF*  : staticcheck quickfix style (De Morgan, switch, Fprintf...)
#   - ST1000: every package must have a doc comment.
#   - ST1003: identifier-naming conventions. Model struct fields like
#     Attn1LN_W mirror neural-network paper notation; renaming would
#     diverge from the literature without buying anything.
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  exclusions:
    rules:
      # Idiomatic: tests routinely call Close() in defer without
      # checking the return.
      - path: _test\.go
        linters:
          - errcheck

  settings:
    errcheck:
      # Functions whose error return is conventionally ignored. The
      # ones below are either best-effort (Close on read paths,
      # Fprintf/Fprintln to stderr/stdout, Flush before exit) or
      # paired with a downstream error check (io.WriteString into a
      # strings.Builder, which never errors).
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*bufio.Writer).Flush
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - io.WriteString
        - (*strings.Builder).WriteString
    staticcheck:
      checks:
        - all
        - -QF1001 # De Morgan rewrite — stylistic
        - -QF1003 # tagged switch rewrite — stylistic
        - -QF1011 # explicit type omission — stylistic
        - -QF1012 # fmt.Fprintf vs WriteString+Sprintf — stylistic
        - -ST1000 # require package doc comment — stylistic
        - -ST1003 # naming conventions — model fields keep paper notation
