# hush project-local configuration (used when hush is invoked from this repo).
# Precedence: CLI flag > HUSH_* env var > this file > built-in default.

workers: 2
# Limit to common source / config extensions in this repo. Uses *.ext form
# so walker classifies them as extension allowlists, not directory patterns.
file-include: ["*.py", "*.env", "*.yml", "*.yaml", "*.json", "*.go", "*.js", "*.ts", "*.tf", "*.toml", "*.ini", "*.conf"]
file-exclude: ["vendor", ".terraform", "artifacts-bitnet"]

presets:
  strict:
    model-threshold: 0.9
    extract-entropy: 3.5
  fast:
    model-off: true
    perf-workers: 8
  ci:
    fail-end: true
    output-json: true
