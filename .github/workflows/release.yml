name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build ${{ matrix.target.os_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os_arch: linux_amd64,  runner: ubuntu-latest,    goos: linux,  goarch: amd64 }
          - { os_arch: linux_arm64,  runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
          - { os_arch: darwin_arm64, runner: macos-latest,     goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build + package archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="hush_${VERSION}_${{ matrix.target.os_arch }}"
          mkdir -p "dist/$BASE"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
            -o "dist/$BASE/hush" \
            ./cmd/hush
          chmod +x "dist/$BASE/hush"
          cp README.md LICENSE CHANGELOG.md PERF.md "dist/$BASE/"
          ( cd dist && tar -czf "$BASE.tar.gz" "$BASE" )
          ( cd dist && shasum -a 256 "$BASE.tar.gz" > "$BASE.tar.gz.sha256" )
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target.os_arch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          retention-days: 7

  release:
    name: sign and publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: List artifacts and build combined SHA256SUMS
        run: |
          set -eux
          cd dist
          ls -lh
          cat *.tar.gz.sha256 > SHA256SUMS
          cat SHA256SUMS

      - uses: sigstore/cosign-installer@v3

      - name: Sign archives (cosign keyless)
        run: |
          cd dist
          for f in *.tar.gz; do
            cosign sign-blob --yes \
              --output-certificate "$f.pem" \
              --output-signature   "$f.sig" \
              "$f"
          done
          cosign sign-blob --yes \
            --output-certificate "SHA256SUMS.pem" \
            --output-signature   "SHA256SUMS.sig" \
            "SHA256SUMS"

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.tar.gz.pem
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
