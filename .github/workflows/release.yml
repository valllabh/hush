name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build ${{ matrix.target.os_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os_arch: linux_amd64,  runner: ubuntu-latest,    goos: linux,  goarch: amd64 }
          - { os_arch: linux_arm64,  runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
          - { os_arch: darwin_arm64, runner: macos-latest,     goos: darwin, goarch: arm64 }
          # darwin_amd64 (Intel Mac) skipped: macos-13 runners are queue-stuck.
          # Intel Mac users: `go install github.com/valllabh/hush/cmd/hush@latest`
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build hush (pure Go, static)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging/${{ matrix.target.os_arch }}
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
            -o "staging/${{ matrix.target.os_arch }}/hush" \
            ./cmd/hush

      - name: Bundle docs
        run: |
          cp README.md LICENSE CHANGELOG.md PERF.md "staging/${{ matrix.target.os_arch }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: hush-${{ matrix.target.os_arch }}
          path: staging/${{ matrix.target.os_arch }}
          retention-days: 7

  release:
    name: goreleaser
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          pattern: hush-*

      - name: Rearrange artifacts (drop hush- prefix)
        run: |
          set -eux
          cd staging
          for d in hush-*; do mv "$d" "${d#hush-}"; done
          ls -la
          for sub in linux_amd64 linux_arm64 darwin_arm64; do
            test -x "$sub/hush"
          done

      - uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance for archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz"
