name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  ORT_VERSION: "1.20.0"

jobs:
  build:
    name: build ${{ matrix.target.os_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os_arch: linux_amd64,  runner: ubuntu-latest,    goos: linux,  goarch: amd64, ort_asset: onnxruntime-linux-x64,      libglob: "libonnxruntime.so*" }
          - { os_arch: linux_arm64,  runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64, ort_asset: onnxruntime-linux-aarch64,  libglob: "libonnxruntime.so*" }
          - { os_arch: darwin_amd64, runner: macos-13,         goos: darwin, goarch: amd64, ort_asset: onnxruntime-osx-x86_64,     libglob: "libonnxruntime*.dylib" }
          - { os_arch: darwin_arm64, runner: macos-latest,     goos: darwin, goarch: arm64, ort_asset: onnxruntime-osx-arm64,      libglob: "libonnxruntime*.dylib" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download ONNX Runtime
        run: |
          set -eux
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${{ matrix.target.ort_asset }}-${ORT_VERSION}.tgz"
          curl -sSL -o /tmp/ort.tgz "$url"
          mkdir -p /tmp/ort
          tar -xzf /tmp/ort.tgz -C /tmp/ort --strip-components=1

      - name: Build hush
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_CFLAGS: "-I/tmp/ort/include"
          CGO_LDFLAGS: "-L/tmp/ort/lib"
          LD_LIBRARY_PATH: "/tmp/ort/lib"
          DYLD_LIBRARY_PATH: "/tmp/ort/lib"
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging/${{ matrix.target.os_arch }}/lib
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
            -o "staging/${{ matrix.target.os_arch }}/hush" \
            ./cmd/hush

      - name: Stage libonnxruntime + INSTALL.md
        run: |
          set -eux
          stage="staging/${{ matrix.target.os_arch }}"
          mkdir -p "$stage/lib"
          # Find every libonnxruntime file (and its symlinks) under /tmp/ort
          # and copy them in. Robust to archive layouts that nest the lib
          # under extra subdirectories.
          echo "Contents of /tmp/ort:"
          find /tmp/ort -maxdepth 4 -type f -o -type l | head -40
          mapfile -t files < <(find /tmp/ort \( -name 'libonnxruntime*.dylib' -o -name 'libonnxruntime.so*' \))
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no libonnxruntime files found under /tmp/ort" >&2
            exit 1
          fi
          for f in "${files[@]}"; do
            cp -P "$f" "$stage/lib/"
          done
          echo "Staged:"
          ls -la "$stage/lib"
          first_lib=$(ls "$stage/lib" | head -1)
          cat > "$stage/INSTALL.md" <<EOF
          # hush ${GITHUB_REF_NAME}

          Extract the archive and put \`hush\` on your \$PATH. The \`lib/\`
          directory ships the matching libonnxruntime. Point hush at it:

              export ONNXRUNTIME_LIB="\$PWD/lib/${first_lib}"

          Or copy the lib file into /usr/local/lib (Linux) or
          /opt/homebrew/lib (macOS) and run \`sudo ldconfig\` so hush
          finds it automatically.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: hush-${{ matrix.target.os_arch }}
          path: staging/${{ matrix.target.os_arch }}
          retention-days: 7

  release:
    name: goreleaser
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          pattern: hush-*

      - name: Rearrange artifacts (drop hush- prefix)
        run: |
          set -eux
          cd staging
          for d in hush-*; do
            mv "$d" "${d#hush-}"
          done
          ls -la
          for sub in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            test -x "$sub/hush"
            test -d "$sub/lib"
          done
          chmod +x */hush || true

      - uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance for archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz"
