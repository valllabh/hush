version: 2

project_name: hush

# We use the prebuilt builder because hush needs CGO to link libonnxruntime
# and cross compiling CGO between macOS and Linux is a nightmare. The
# release workflow builds binaries natively on a platform matrix, stages
# them in ./staging/{os}_{arch}/, and this config assembles archives,
# shasums, signatures and the GitHub Release.
builds:
  - id: hush
    builder: prebuilt
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    prebuilt:
      path: staging/{{ .Os }}_{{ .Arch }}/hush
    binary: hush
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

archives:
  - id: hush
    ids: [hush]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - src: "staging/{{ .Os }}_{{ .Arch }}/lib/*"
        dst: lib
        strip_parent: true
      - src: "staging/{{ .Os }}_{{ .Arch }}/INSTALL.md"
        dst: INSTALL.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: all

changelog:
  use: github
  sort: asc
  groups:
    - { title: Features, regexp: "^feat",  order: 0 }
    - { title: Fixes,    regexp: "^fix",   order: 1 }
    - { title: Docs,     regexp: "^docs",  order: 2 }
    - { title: CI,       regexp: "^ci",    order: 3 }
    - { title: Chore,    regexp: "^chore", order: 4 }
    - { title: Other,    order: 999 }
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge branch"

release:
  prerelease: auto
  draft: false
  github:
    owner: valllabh
    name: hush
  header: |
    ## hush {{ .Tag }}

    Download the archive for your platform. Each archive bundles the
    matching libonnxruntime so hush runs out of the box after extraction:

    ```
    tar -xzf hush_{{ .Version }}_linux_amd64.tar.gz
    cd hush_{{ .Version }}_linux_amd64
    export ONNXRUNTIME_LIB="$PWD/lib/$(ls lib | head -1)"
    ./hush version
    ```
  footer: |
    ## Verify

    Every archive is signed with [cosign](https://github.com/sigstore/cosign)
    keyless. See [SECURITY.md](SECURITY.md#verifying-a-release) for the
    full verification command.
