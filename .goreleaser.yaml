version: 2

project_name: hush

# Static pure-Go binaries built on native-OS matrix runners and staged
# into ./staging/{os}_{arch}/. No CGO, no libonnxruntime bundling.
builds:
  - id: hush
    builder: prebuilt
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    prebuilt:
      path: staging/{{ .Os }}_{{ .Arch }}/hush
    binary: hush
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

archives:
  - id: hush
    ids: [hush]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - PERF.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: all

changelog:
  use: github
  sort: asc
  groups:
    - { title: Features, regexp: "^feat",  order: 0 }
    - { title: Fixes,    regexp: "^fix",   order: 1 }
    - { title: Docs,     regexp: "^docs",  order: 2 }
    - { title: CI,       regexp: "^ci",    order: 3 }
    - { title: Chore,    regexp: "^chore", order: 4 }
    - { title: Other,    order: 999 }
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge branch"

release:
  prerelease: auto
  draft: false
  github:
    owner: valllabh
    name: hush
  header: |
    ## hush {{ .Tag }}

    Static pure-Go binary — no CGO, no libonnxruntime, no runtime deps.
    The int8 BitNet model is embedded in the binary.

    ```
    tar -xzf hush_{{ .Version }}_linux_amd64.tar.gz
    cd hush_{{ .Version }}_linux_amd64
    ./hush version
    ```
  footer: |
    ## Verify

    Every archive is signed with [cosign](https://github.com/sigstore/cosign)
    keyless. See [SECURITY.md](SECURITY.md#verifying-a-release) for the
    full verification command.
